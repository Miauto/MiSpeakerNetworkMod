<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>MiSpeaker Control</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f4; padding-top: 40px; }
        h1 { margin-bottom: 20px; }
        .status { font-size: 20px; margin-bottom: 30px; }
        .buttons button {
            padding: 15px 25px; margin: 10px; font-size: 18px;
            border: none; border-radius: 8px; cursor: pointer;
            background: #0078ff; color: white;
        }
        .buttons button:hover { background: #005fcc; }
        .autoswitch { margin-top: 30px; font-size: 16px; }
    </style>
</head>
<body>

<h1>MiSpeaker Control</h1>

<div class="status">
    Source active : <span id="current">...</span>
</div>

<div class="buttons">
    <button onclick="setSource('spotify')">Spotify</button>
    <button onclick="setSource('bluetooth')">Bluetooth</button>
    <button onclick="setSource('linein')">Line-In</button>
    <button onclick="setSource('dlnainit')">DLNA</button>
</div>

<div class="autoswitch">
    <label>
        <input type="checkbox" id="autoSwitch" onchange="toggleAutoSwitch()">
        Auto-switch (dernier qui parle)
    </label>
</div>

<script>
function api(url) {
    return fetch(url).then(r => r.json());
}

function refreshState() {
    api("/cgi-bin/mispeaker.sh?action=state").then(data => {
        document.getElementById("current").innerText = data.source;
        document.getElementById("autoSwitch").checked = !!data.auto_switch;
    });
}

function setSource(src) {
    api("/cgi-bin/mispeaker.sh?action=set_source&src=" + encodeURIComponent(src))
        .then(refreshState);
}

function toggleAutoSwitch() {
    const enabled = document.getElementById("autoSwitch").checked ? "1" : "0";
    api("/cgi-bin/mispeaker.sh?action=auto_switch&enable=" + enabled)
        .then(refreshState);
}

refreshState();
setInterval(refreshState, 3000);
</script>

</body>
</html>
